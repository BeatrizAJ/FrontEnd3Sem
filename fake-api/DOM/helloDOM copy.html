<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 
</head>

<body>
    <h1 id="titulo">Bem Vindo</h1>

    <p>Hello DOM JS</p>
    <button onclick="saudacao();">Click em mim</button>
    <button onmousedown="saudacao();">Click em mim</button>
    <button onmouseup="saudacao();">Click em mim</button>
    <button ondblclick="mouseClicadoDuasVezes();">Click 2 vezes</button>
    <button onmouseover="saudacaoLegal();">Passe o mouse</button>

       <script>
        alert(`Titulo: ${document.getElementById("titulo").textContent}`);
        
        function saudacao() {
            alert("cateye!");
        }
        function saudacaoLegal() {
            alert("sou tao fa que ate no senai penso nelas!");
        }
        function mouseClicadoDuasVezes() {
            alert("Mouse Clicado 2 vezes!");
        }
    </script>
</body>
</html>
